    id: .ctor
    path: ../../MupenSharp/MupenSharp/MupenSharp/Models/InputModel.cs
    startLine: 92
  assemblies:
  - MupenSharp
  namespace: MupenSharp.Models
  summary: "\nInputModel representing data contained within an .m64 file.\n"
  example: []
  syntax:
    content: public InputModel(byte[] input)
    parameters:
    - id: input
      type: System.Byte[]
      description: "\nA 4-byte value containing X and Y analogue positions, and the XOR of buttons pressed.\nThe first two bytes are the XOR of the buttons, followed by the X and Y inputs\nrepresented by 1-byte each.\n<p></p>\n<example>\n  Given the input 0xC0182541, this can be seen as:\n<ul><li>Button Flags2-bytes = C0 18</li><li>X Analogue1-byte = 25</li><li>Y Analogue1-byte = 41</li></ul>\n</example>\n<remarks>\n  When reading from an .m64 file from offset 0x400, 4-bytes at a time, the following code works if the\n  hex input is NOT REVERSED.\n</remarks>\n"
    content.vb: Public Sub New(input As Byte())
  overload: MupenSharp.Models.InputModel.#ctor*
  nameWithType.vb: InputModel.InputModel(Byte())
